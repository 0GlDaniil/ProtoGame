version: '3.8'

services:
  spirit-nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spirit-nexus-monitor
    ports:
      - "8080:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - ./logs:/app/logs
    networks:
      - spirit-network

networks:
  spirit-network:
    driver: bridge
